<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pendekar Kata - Game Educational Typing Melayu</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Cinzel:wght@700&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans', sans-serif;
            /* Outside-canvas background (avoid bluish tone) */
            background: radial-gradient(circle at 20% 20%, #2b2056 0%, #0b0820 55%, #070613 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            position: relative;
            max-width: 100%;
            max-height: 100vh;
            border: 3px solid rgba(255, 215, 0, 0.35);
            border-radius: 14px;
            box-shadow:
                0 24px 70px rgba(0, 0, 0, 0.55),
                inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        #orientation-message {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 41, 0.95);
            color: #fff;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        #orientation-message h2 {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffd700;
        }

        #orientation-message p {
            font-size: 16px;
            margin-bottom: 30px;
        }

        .rotate-icon {
            font-size: 60px;
            animation: rotate 2s infinite;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .loading h1 {
            font-family: 'Cinzel', serif;
            color: #ffd700;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .loading-bar {
            width: 300px;
            height: 6px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px #ffd700;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading-screen">
        <h1>PENDEKAR KATA</h1>
        <div class="loading-bar">
            <div class="loading-progress" id="loading-progress"></div>
        </div>
    </div>

    <div id="orientation-message">
        <h2>Sila Putar Skrin</h2>
        <p>Untuk pengalaman terbaik, sila gunakan mod landskap</p>
        <div class="rotate-icon">📱 ↻</div>
    </div>

    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="proverbData.js"></script>
    <script src="game.js"></script>
</body>
</html>
